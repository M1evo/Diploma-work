<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Система субъективной оценки качества изображений методом попарных сравнений">
    <title>Система попарного сравнения изображений</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ============================== -->
    <!--  Экран авторизации (логин)      -->
    <!-- ============================== -->
    <div id="login-screen" class="screen active">
        <div class="login-card glass">
            <div class="login-header">
                <div class="login-icon">⚖️</div>
                <h1>Оценка качества изображений</h1>
                <p class="login-subtitle">Система субъективных попарных сравнений</p>
            </div>
            <form id="login-form" autocomplete="off">
                <div class="input-group">
                    <label for="nickname-input">Ваш никнейм</label>
                    <input type="text" id="nickname-input" placeholder="Например: ivan" required minlength="2"
                        maxlength="32" pattern="[A-Za-zА-Яа-яёЁ0-9_\-]+">
                    <span class="input-hint">Латиница, кириллица, цифры, _, -</span>
                </div>
                <button type="submit" id="login-btn" class="btn btn-primary">
                    Начать оценку
                    <span class="btn-arrow">→</span>
                </button>
            </form>
        </div>
    </div>

    <!-- ============================== -->
    <!--  Экран сравнения                -->
    <!-- ============================== -->
    <div id="comparison-screen" class="screen">
        <header class="top-bar glass">
            <div class="top-bar-left">
                <span class="logo-mini">⚖️</span>
                <span class="app-title">Попарное сравнение</span>
            </div>
            <div class="top-bar-right">
                <span id="user-badge" class="badge"></span>
                <span id="counter-badge" class="badge badge-accent">0 оценок</span>
                <button id="logout-btn" class="btn btn-ghost btn-sm" title="Выйти">✕</button>
            </div>
        </header>

        <main class="comparison-area">
            <p class="instruction">Какое изображение имеет <strong>лучшее качество</strong>?</p>

            <div class="images-row">
                <!-- Левое изображение -->
                <div class="image-card glass" id="card-left">
                    <div class="image-wrapper">
                        <img id="img-left" src="" alt="Изображение A">
                        <div class="image-label">A</div>
                    </div>
                    <p class="image-path" id="path-left"></p>
                </div>

                <div class="vs-divider">VS</div>

                <!-- Правое изображение -->
                <div class="image-card glass" id="card-right">
                    <div class="image-wrapper">
                        <img id="img-right" src="" alt="Изображение B">
                        <div class="image-label">B</div>
                    </div>
                    <p class="image-path" id="path-right"></p>
                </div>
            </div>

            <!-- Панель голосования -->
            <div class="vote-panel">
                <button class="btn btn-vote btn-left" id="vote-left" data-vote="<" title="Левое лучше">
                    <span class="vote-icon">◀</span>
                    <span class="vote-text">A лучше</span>
                </button>
                <button class="btn btn-vote btn-equal" id="vote-equal" data-vote="=" title="Равны">
                    <span class="vote-icon">=</span>
                    <span class="vote-text">Равны</span>
                </button>
                <button class="btn btn-vote btn-right" id="vote-right" data-vote=">" title="Правое лучше">
                    <span class="vote-text">B лучше</span>
                    <span class="vote-icon">▶</span>
                </button>
            </div>

            <!-- Клавиатурные подсказки -->
            <p class="keyboard-hint">
                Горячие клавиши: <kbd>1</kbd> A лучше · <kbd>2</kbd> Равны · <kbd>3</kbd> B лучше
            </p>
        </main>

        <!-- Состояние загрузки -->
        <div id="loading-overlay" class="loading-overlay hidden">
            <div class="spinner"></div>
        </div>

        <!-- Toast-уведомления -->
        <div id="toast-container" class="toast-container"></div>
    </div>

    <script src="app.js"></script>
</body>

</html>
